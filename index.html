// ═══════════════════════════════════════════════════════
//  PASSWORD HASHING (PBKDF2 — same as BSH)
// ═══════════════════════════════════════════════════════
async function hashPassword(password, username) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
  );
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', salt: enc.encode('bsh42_' + username.toLowerCase()),
      iterations: 100000, hash: 'SHA-256' },
    keyMat, 256
  );
  return [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2,'0')).join('');
}

//  PICKS — Supabase-backed (falls back to localStorage)
// ═══════════════════════════════════════════════════════
let currentUser = null;
let ssData = { game_picks:{}, all_picked:[], scores:{} }; // all_picked = names picked across all time

async function loadSSData() {
  if(!currentUser) return;
  try {
    const {data} = await db.from('players').select('today_pick').eq('username', currentUser.username).single();
    if(data && data.today_pick) {
      try { ssData = {...ssData, ...JSON.parse(data.today_pick)}; } catch(e){}
    }
  } catch(e) {
    // fall back to local
    const local = localStorage.getItem('ss_data_'+currentUser.username);
    if(local) try { ssData = {...ssData, ...JSON.parse(local)}; } catch(e2){}
  }
}

async function saveSSData() {
  if(!currentUser) return;
  const json = JSON.stringify(ssData);
  localStorage.setItem('ss_data_'+currentUser.username, json);
  try {
    await db.from('players').update({today_pick: json}).eq('username', currentUser.username);
  } catch(e){}
}

function getGamePick(gameId){ return ssData.game_picks[gameId]||null; }
function getAllPicked(){ return ssData.all_picked||[]; }

async function setGamePick(gameId, playerName) {
  const prev = ssData.game_picks[gameId];
  if(prev) {
    ssData.all_picked = (ssData.all_picked||[]).filter(n=>n!==prev);
  }
  if(playerName) {
    ssData.game_picks[gameId] = playerName;
    if(!ssData.all_picked) ssData.all_picked=[];
    if(!ssData.all_picked.includes(playerName)) ssData.all_picked.push(playerName);
  } else {
    delete ssData.game_picks[gameId];
  }
  await saveSSData();
}

async function clearGamePick(gameId) {
  await setGamePick(gameId, null);
}

function showLogin(){document.getElementById('joinForm').style.display='none';document.getElementById('loginForm').style.display='block';document.getElementById('loginUser').focus();}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const btn=document.getElementById('loginBtn');
  const errEl=document.getElementById('loginError');
  errEl.style.display='none';
  if(!u||!p) return;
  btn.disabled=true; btn.textContent='LOADING...';
  // Admin shortcut
  if(u==='nick0'&&p==='123'){
    await loginSuccess({username:'nick0',role:'ss_admin'}); btn.disabled=false; btn.textContent="LET'S SPLASH 🏀"; return;
  }
  try {
    const {data:rows} = await db.from('players').select('*').eq('username',u).single();
    if(!rows){errEl.textContent='Invalid username or password';errEl.style.display='block';btn.disabled=false;btn.textContent="LET'S SPLASH 🏀";return;}
    // Check password
    let ok=false;
    if(rows.password_hash){
      const h=await hashPassword(p,u);
      ok=(h===rows.password_hash);
    } else if(rows.plain_password){
      ok=(p===rows.plain_password);
    }
    if(!ok){errEl.textContent='Invalid username or password';errEl.style.display='block';btn.disabled=false;btn.textContent="LET'S SPLASH 🏀";return;}
    await loginSuccess({username:u, role:rows.role||'ss_user'});
  } catch(e){
    errEl.textContent='Connection error — try again';errEl.style.display='block';
  }
  btn.disabled=false; btn.textContent="LET'S SPLASH 🏀";
}

async function doJoin(){
  const u=document.getElementById('joinUser').value.trim();
  const p=document.getElementById('joinPass').value;
  const p2=document.getElementById('joinPass2').value;
  const errEl=document.getElementById('joinError');
  const okEl=document.getElementById('joinSuccess');
  const btn=document.getElementById('joinBtn');
  errEl.style.display='none'; okEl.style.display='none';
  if(!u||u.length<2){errEl.textContent='Username must be at least 2 chars';errEl.style.display='block';return;}
  if(!p||p.length<3){errEl.textContent='Password must be at least 3 chars';errEl.style.display='block';return;}
  if(p!==p2){errEl.textContent='Passwords do not match';errEl.style.display='block';return;}
  btn.disabled=true; btn.textContent='CREATING...';
  try {
    const h=await hashPassword(p,u);
    const {error}=await db.from('players').insert({
      username:u, password_hash:h, plain_password:p,
      role:'ss_user', status:'active', credits:1, streak:0, strikes:0, today_pick:null
    });
    if(error){errEl.textContent=error.message.includes('duplicate')?'Username already taken':'Error creating account';errEl.style.display='block';btn.disabled=false;btn.textContent='JOIN THE SPLASH';return;}
    okEl.style.display='block';
    setTimeout(()=>loginSuccess({username:u,role:'ss_user'}),700);
  } catch(e){errEl.textContent='Connection error';errEl.style.display='block';}
  btn.disabled=false; btn.textContent='JOIN THE SPLASH';
}

async function loginSuccess(user){
  currentUser=user;
  ssData={game_picks:{},all_picked:[],scores:{}};
  await loadSSData();
  localStorage.setItem('ssUser',JSON.stringify(user));
  document.getElementById('loginPage').style.display='none';
  if(user.role==='ss_admin'||user.role==='admin'){
    // Admin: skip game interface, go straight to admin panel
    document.getElementById('adminGear').style.display='flex';
    openAdmin();
  } else {
    document.getElementById('app').style.display='block';
    document.getElementById('userLabel').textContent=user.username.toUpperCase();
    renderTab('picks');
  }
}

function doLogout(){

  document.getElementById('loginPage').style.display='flex';

function renderPicksTab(){
  let html='';
  html+="<div class='picks-intro'>";

  html+="<div class='picks-intro-body'>Pick <strong style='color:#FDB927'>1 player per game</strong> from either team's dropdown. ";
  html+="Once picked, that player is <strong style='color:#f88'>locked for your entire playoffs</strong>. ";
  html+="⭐ Stars = 1PT &bull; 🏀 Role Players = 2PT &bull; 🧱 Brick City = 3PT</div></div>";

  GAMES.forEach(g=>{ html+=buildGameCard(g); });

  // Summary
  const picked=Object.entries(ssData.game_picks||{}).filter(([,v])=>!!v);
  if(picked.length>0){
    html+="<div class='picks-summary'><h3>✅ YOUR PICKS TODAY ("+picked.length+"/"+GAMES.length+")</h3>";
    picked.forEach(([gid,pname])=>{
      const p=findPlayer(pname); if(!p) return;
      const ptsLbl=p.pts===1?'⭐ 1PT':p.pts===2?'🏀 2PT':'🧱 3PT';
      const ptsCls='pts-'+p.pts;
      html+="<div class='pick-row'>";
      html+="<img class='pr-photo' src='"+photoUrl(p.id)+"' onerror=\"this.style.background='#1a1a30';this.src=''\" alt='"+pname+"'>";
      html+="<span class='pr-name'>"+pname+"</span>";
      html+="<span class='pr-pts pts-chip "+ptsCls+"'>"+ptsLbl+"</span>";
      html+="</div>";
    });
    html+="</div>";
  }

  document.getElementById('tabContent').innerHTML=html;

  // Attach listeners after render
  GAMES.forEach(g=>{
    ['away','home'].forEach(side=>{
      const sel=document.getElementById('sel_'+g.id+'_'+side);
      if(sel) sel.addEventListener('change',function(){onPickPlayer(g.id,this.value);});
    });
    const clr=document.getElementById('clr_'+g.id);
    if(clr) clr.addEventListener('click',()=>{clearGamePick(g.id).then(()=>renderPicksTab());});

function buildGameCard(game){
  const awT=TEAMS[game.away], hmT=TEAMS[game.home];
  const pick=getGamePick(game.id);
  const pickedAll=getAllPicked();
  const locked=Date.now()>game.tipoff;
  const hasPick=!!pick;

  let html="<div class='game-card"+(hasPick?' has-pick':'')+"' id='card_"+game.id+"'>";

  // Header
  html+="<div class='game-header'>";
  html+="<div class='gh-team away'>";
  html+="<img class='gh-logo' src='"+logoUrl(awT.id)+"' onerror=\"this.style.display='none'\" alt='"+awT.abbr+"'>";
  html+="<div class='gh-abbr'>"+awT.abbr+"</div><div class='gh-full'>"+awT.name+"</div></div>";
  html+="<div class='gh-meta'><div class='gh-vs'>@</div><div class='gh-time'>"+game.time+"</div><div class='gh-series'>"+game.series+"</div></div>";
  html+="<div class='gh-team home'>";
  html+="<img class='gh-logo' src='"+logoUrl(hmT.id)+"' onerror=\"this.style.display='none'\" alt='"+hmT.abbr+"'>";
  html+="<div class='gh-abbr'>"+hmT.abbr+"</div><div class='gh-full'>"+hmT.name+"</div></div>";
  html+="</div>";

  // Dropdowns or locked message
  if(!hasPick){
    if(locked){
      html+="<div class='game-locked-bar'>🔒 GAME LOCKED — TIPOFF PASSED</div>";
    } else {
      html+="<div class='game-drops'>";
      html+=buildDropdown(game,'away',awT,pickedAll);
      html+=buildDropdown(game,'home',hmT,pickedAll);
      html+="</div>";
    }
  }

  // Pick confirmation
  if(hasPick){
    const p=findPlayer(pick);
    if(p){
      const ptsLbl=p.pts===1?'⭐ 1PT':p.pts===2?'🏀 2PT':'🧱 3PT';
      const ptsCls='pts-'+p.pts;
      const pTeam=TEAMS[p.team]||{id:0,full:p.team};
      html+="<div class='pick-confirm show'><div class='pick-confirm-row'>";
      html+="<img class='pick-photo' src='"+photoUrl(p.id)+"' onerror=\"this.style.background='#1a1a30';this.src=''\" alt='"+p.name+"'>";
      html+="<div class='pick-info'>";
      html+="<div class='pick-name'>"+p.name+"</div>";
      html+="<div class='pick-team-row'>";
      html+="<img class='pick-team-logo' src='"+logoUrl(pTeam.id)+"' onerror=\"this.style.display='none'\" alt='"+p.team+"'>";
      html+="<span class='pick-team-name'>"+pTeam.full+"</span></div>";
      html+="<div class='pick-stats'>"+p.tpm+" 3PM/G &bull; "+p.pct+"% 3PT &bull; "+p.ppg+" PPG</div>";
      html+="<div class='pick-badges'>";
      html+="<span class='pick-tag'>✓ YOUR PICK</span>";
      html+="<span class='pts-chip "+ptsCls+"'>"+ptsLbl+"</span>";
      if(!locked) html+="<button class='pick-change-btn' id='clr_"+game.id+"'>Change pick</button>";
      html+="</div></div></div></div>";
    }
  }

  html+="</div>";
  return html;
}

function buildDropdown(game, side, team, pickedAll){
  const names=side==='away'?game.awayPlayers:game.homePlayers;
  let html="<div class='drop-section'>";
  html+="<div class='drop-label'><img class='drop-logo' src='"+logoUrl(team.id)+"' onerror=\"this.style.display='none'\" alt='"+team.abbr+"'> "+team.abbr+" "+team.name.toUpperCase()+"</div>";
  html+="<select class='player-select' id='sel_"+game.id+"_"+side+"'>";
  html+="<option value=''>Pick a "+team.name+"...</option>";
  names.forEach(pname=>{
    const p=findPlayer(pname); if(!p) return;
    const used=pickedAll.includes(pname);
    const ptsLbl=p.pts===1?'⭐ 1PT':p.pts===2?'🏀 2PT':'🧱 3PT';
    html+="<option value='"+pname+"'"+(used?' disabled':'')+">";
    html+=pname+" — "+ptsLbl+(used?' (USED)':'');
    html+="</option>";
  });
  html+="</select></div>";
  return html;
}

async function onPickPlayer(gameId, playerName){

}

function renderRefTab(players, label, pts){
  const ptsLbl=pts===1?'1PT':pts===2?'2PT':'3PT';
  const ptsCls='pts-'+pts;
  const desc=pts===1?'High-volume 3PT shooters & primary scorers — sorted by shooting value.':
             pts===2?'Moderate shooters & bench contributors — good value picks.':
             'Centers & low-usage players — low odds but max reward.';
  let html='';
  html+="<div class='rules-banner'><div class='pts-badge-lbl'>"+ptsLbl+"</div><p><strong style='color:#FDB927'>"+label+"</strong><br>"+desc+" Pick these in <strong>TODAY'S PICKS</strong>.</p></div>";
  html+="<div class='section-header'>"+label+"</div>";
  html+="<div class='section-sub'>"+players.length+" players &bull; 2026 Playoffs only &bull; Ranked by shooting value</div>";

  players.forEach((p,i)=>{
    const t=TEAMS[p.team]||{id:0,full:p.team};
    html+="<div class='player-card'><div class='card-inner'>";
    html+="<img class='card-photo' src='"+photoUrl(p.id)+"' onerror=\"this.style.background='#1a1a30';this.src=''\" alt='"+p.name+"'>";
    html+="<div class='card-info'>";
    html+="<div class='card-name'>"+(i<3?"🔥 ":"")+p.name+"</div>";
    html+="<div class='card-team'><img class='team-logo-sm' src='"+logoUrl(t.id)+"' onerror=\"this.style.display='none'\" alt='"+p.team+"'><span class='card-team-name'>"+t.full+"</span></div>";
    html+="<div class='card-stats'>"+p.tpm+" 3PM/G &bull; "+p.pct+"% 3PT &bull; "+p.ppg+" PPG</div>";
    if(p.note) html+="<div class='card-note'>"+p.note+"</div>";
    html+="</div><div class='card-right'><div class='pts-chip "+ptsCls+"'>"+(pts===1?'⭐':pts===2?'🏀':'🧱')+" "+ptsLbl+"</div></div></div></div>";
  });

  document.getElementById('tabContent').innerHTML=html;
}

async function renderAdminScore(){
  let rows=[];
  try {
    const {data}=await db.from('players').select('username,today_pick').not('today_pick','is',null);
    rows=data||[];
  } catch(e){}

  let html="<div class='admin-section'><h3>LEADERBOARD</h3>";
  const scores=[];
  rows.forEach(r=>{
    let d={game_picks:{},scores:{}};
    try{d=JSON.parse(r.today_pick||'{}');}catch(e){}
    let total=0;
    Object.entries(d.scores||{}).forEach(([gid,result])=>{
      if(result==='made'){
        const pname=d.game_picks?.[gid];
        const p=findPlayer(pname);
        if(p) total+=p.pts;
      }
    });
    scores.push({username:r.username,total,picks:Object.keys(d.game_picks||{}).length});
  });
  scores.sort((a,b)=>b.total-a.total);
  html+="<table class='admin-table'><tr><th>#</th><th>USERNAME</th><th>PICKS</th><th>POINTS</th></tr>";
  scores.forEach((s,i)=>{
    html+=`<tr><td style='color:#FDB927'>${i+1}</td><td>${s.username}</td><td>${s.picks}</td><td style='color:#FDB927;font-family:Bebas Neue'>${s.total}PT</td></tr>`;
  });
  if(scores.length===0) html+="<tr><td colspan='4' style='color:#5a5a7a'>No scored picks yet</td></tr>";
  html+="</table></div>";
  document.getElementById('adminContent').innerHTML=html;
}

async function adminAddUser(){
  const u=document.getElementById('anU').value.trim();
  const p=document.getElementById('anP').value;
  const r=document.getElementById('anR').value;
  if(!u||!p){showToast('Fill all fields');return;}
  const h=await hashPassword(p,u);
  const {error}=await db.from('players').insert({
    username:u,password_hash:h,plain_password:p,role:r,status:'active',credits:1,streak:0,strikes:0,today_pick:null
  });
  if(error){showToast('Error: '+error.message);}
  else{showToast('✓ Created '+u);renderAdmin();}

async function removeUser(username){
  if(!confirm('Delete user '+username+'?')) return;
  await db.from('players').delete().eq('username',username);
  showToast('✓ Removed '+username);renderAdmin();
}

async function resetPicks(username){
  if(!confirm('Reset all picks for '+username+'?')) return;
  await db.from('players').update({today_pick:null}).eq('username',username);
  showToast('✓ Reset picks for '+username);renderAdmin();
}

async function markPick(username, gameId, result){
  const {data}=await db.from('players').select('today_pick').eq('username',username).single();
  let d={game_picks:{},scores:{}};
  try{d=JSON.parse(data?.today_pick||'{}');}catch(e){}
  if(!d.scores) d.scores={};
  d.scores[gameId]=result;
  await db.from('players').update({today_pick:JSON.stringify(d)}).eq('username',username);
  showToast('Marked as '+result);renderAdmin();
}
