*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080810;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;}

/* LOGIN */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#080810 0%,#12082a 100%);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .fire-ball{font-size:72px;line-height:1;filter:drop-shadow(0 0 20px rgba(253,185,39,0.5));}
.login-logo h1{font-family:'Bebas Neue',sans-serif;font-size:58px;font-weight:700;color:#FDB927;letter-spacing:5px;margin-top:10px;text-shadow:0 0 30px rgba(253,185,39,0.4);}
.login-logo .tagline{color:#7c6fa0;font-size:13px;letter-spacing:3px;margin-top:4px;text-transform:uppercase;}
.login-card{background:rgba(18,8,42,0.8);border:1px solid rgba(253,185,39,0.3);border-radius:16px;padding:32px;width:100%;max-width:360px;backdrop-filter:blur(10px);}
.login-card input{width:100%;background:#0e0e1e;border:1px solid #2a2a4a;color:#fff;padding:12px 16px;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;transition:border .2s;}
.login-card input:focus{border-color:#FDB927;}
.login-card input::placeholder{color:#4a4a6a;}
.login-btn{width:100%;background:linear-gradient(135deg,#FDB927,#f0a800);color:#000;border:none;padding:14px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.login-btn:hover{opacity:.9;}
.login-error{display:none;background:rgba(255,68,68,.15);border:1px solid #f44;color:#f88;padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-top:10px;}
.login-kobe{text-align:center;margin-top:20px;color:#5a4a70;font-size:12px;font-style:italic;line-height:1.5;}

/* APP */
#app{display:none;min-height:100vh;}
.app-header{background:linear-gradient(90deg,#0a0a1a,#1a0a30);border-bottom:2px solid rgba(253,185,39,0.3);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.app-header h1{font-family:'Bebas Neue',sans-serif;font-size:26px;font-weight:700;color:#FDB927;letter-spacing:3px;}
.header-actions{display:flex;align-items:center;gap:12px;}
.logout-btn{background:none;border:1px solid #333;color:#aaa;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
.logout-btn:hover{border-color:#FDB927;color:#FDB927;}

/* TABS */
.tabs{display:flex;background:#0d0d1a;border-bottom:1px solid #1a1a30;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{flex:1;min-width:90px;padding:12px 8px 10px;text-align:center;cursor:pointer;border:none;background:none;color:#6a6a8a;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.tab-btn.active{color:#FDB927;border-bottom-color:#FDB927;}
.tab-btn .tab-pts{display:block;font-family:'Inter',sans-serif;font-size:10px;color:#FDB927;opacity:.7;margin-top:2px;font-weight:600;}
.tab-btn.active .tab-pts{opacity:1;}

/* CONTENT */
.tab-content{padding:16px;max-width:600px;margin:0 auto;}

/* RULES BANNER */
.rules-banner{background:rgba(253,185,39,.08);border:1px solid rgba(253,185,39,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.rules-banner .pts-badge{background:#FDB927;color:#000;font-family:'Bebas Neue',sans-serif;font-size:18px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.rules-banner p{color:#c0b0e0;font-size:13px;line-height:1.4;}

/* SECTION HEADER */
.section-header{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#FDB927;letter-spacing:2px;margin-bottom:4px;}
.section-sub{color:#7c6fa0;font-size:13px;margin-bottom:16px;}

/* PLAYER CARD */
.player-card{background:rgba(14,14,28,.9);border:2px solid #1e1e36;border-radius:14px;padding:0;margin-bottom:12px;cursor:pointer;transition:all .25s;overflow:hidden;}
.player-card:hover{border-color:#3a3a5a;transform:translateY(-1px);}
.player-card.selected{border-color:#FDB927;background:rgba(30,20,60,.95);box-shadow:0 0 20px rgba(253,185,39,.25);}
.card-inner{display:flex;align-items:center;gap:0;padding:14px;}
.card-photo{width:60px;height:60px;border-radius:10px;object-fit:cover;object-position:top;background:#1a1a30;flex-shrink:0;border:2px solid #2a2a40;}
.card-photo.selected-img{border-color:#FDB927;}
.card-info{flex:1;padding:0 12px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:19px;font-weight:700;color:#fff;letter-spacing:.5px;line-height:1.1;}
.card-name.selected-name{color:#FDB927;}
.card-team{display:flex;align-items:center;gap:6px;margin-top:3px;}
.team-logo{width:20px;height:20px;object-fit:contain;}
.card-team-name{color:#9b8fcf;font-size:12px;font-weight:500;}
.card-stats{color:#9b8fcf;font-size:12px;margin-top:4px;}
.card-note{color:#7a7a9a;font-size:11px;margin-top:3px;font-style:italic;}
.card-right{display:flex;flex-direction:column;align-items:center;gap:6px;padding-right:4px;}
.hot-badge{font-size:18px;}
.pts-chip{background:rgba(253,185,39,.15);color:#FDB927;font-family:'Bebas Neue',sans-serif;font-size:14px;padding:3px 8px;border-radius:6px;border:1px solid rgba(253,185,39,.3);}
.selected-tag{background:rgba(253,185,39,.12);border-top:1px solid rgba(253,185,39,.2);padding:8px 14px;display:flex;align-items:center;gap:6px;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#FDB927;letter-spacing:1px;}

/* PICKS SUMMARY */
.picks-summary{margin-top:20px;background:rgba(20,10,40,.9);border:2px solid #FDB927;border-radius:12px;padding:16px;}
.picks-summary h3{font-family:'Bebas Neue',sans-serif;color:#FDB927;font-size:20px;margin-bottom:10px;letter-spacing:1px;}
.pick-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.pick-row:last-child{border-bottom:none;}
.pick-row-name{color:#fff;font-size:14px;}
.pick-row-pts{color:#FDB927;font-family:'Bebas Neue',sans-serif;font-size:14px;}

/* ADMIN GEAR */
#adminGear{position:fixed;bottom:24px;right:20px;width:48px;height:48px;background:#12122a;border:2px solid #FDB927;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.4);}

/* ADMIN OVERLAY */
#adminOverlay{position:fixed;inset:0;background:rgba(5,5,15,.97);z-index:9999;overflow-y:auto;padding:20px;display:none;}
.admin-panel{max-width:580px;margin:0 auto;background:#0e0e1e;border:2px solid rgba(253,185,390,.4);border-radius:16px;padding:24px;}
.admin-title{font-family:'Bebas Neue',sans-serif;color:#FDB927;font-size:30px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.admin-section{margin-bottom:24px;}
.admin-section h3{font-family:'Bebas Neue',sans-serif;color:#9b8fcf;font-size:18px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1a30;}
.admin-table{width:100%;border-collapse:collapse;}
.admin-table th{padding:10px;color:#FDB927;text-align:left;background:#12122a;font-size:13px;font-weight:600;}
.admin-table td{padding:10px;border-bottom:1px solid #181828;font-size:14px;}
.admin-table tr:last-child td{border-bottom:none;}
.admin-inputs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.admin-inputs input,.admin-inputs select{flex:1;min-width:100px;background:#12122a;border:1px solid #2a2a40;color:#fff;padding:9px 12px;border-radius:8px;font-size:14px;outline:none;}
.admin-inputs input:focus,.admin-inputs select:focus{border-color:#FDB927;}
.btn-gold{background:#FDB927;color:#000;border:none;padding:9px 18px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;font-weight:700;}
.btn-red{background:rgba(255,68,68,.1);border:1px solid #f44;color:#f44;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-close{background:none;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:14px;}
.stat-box{background:#12122a;padding:14px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;}
.stat-box .stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#FDB927;}
</style>
</head>

// ---- AUTH ----
function doLogin(){
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  if(u === 'nick0' && p === '123'){
    loginSuccess({username:'nick0', role:'admin'});
    return;
  }
  var users = JSON.parse(localStorage.getItem('ssUsers') || '[]');
  var match = users.find(function(x){ return x.username === u && x.password === p; });
  if(match){
    loginSuccess({username:match.username, role:match.role});
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function loginSuccess(user){
  currentUser = user;
  localStorage.setItem('ssUser', JSON.stringify(user));
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userLabel').textContent = user.username.toUpperCase();
  if(user.role === 'admin') document.getElementById('adminGear').style.display = 'flex';
  renderTab(currentTab);
}

function doLogout(){
  currentUser = null;
  localStorage.removeItem('ssUser');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminGear').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
}

function togglePick(tab, name){
  var picks = getPicks(tab);
  var idx = picks.indexOf(name);
  if(idx > -1){ picks.splice(idx,1); }
  else if(picks.length < 5){ picks.push(name); }
  savePicks(tab, picks);
  renderTab(tab);
}

  renderTab(tab);
}

function addUser(){
  var u = document.getElementById('anU').value.trim();
  var p = document.getElementById('anP').value;
  var r = document.getElementById('anR').value;
  if(!u || !p) return;
  var users = JSON.parse(localStorage.getItem('ssUsers') || '[]');
  if(users.find(function(x){return x.username===u;}) || u==='nick0'){ alert('Username taken'); return; }
  users.push({username:u, password:p, role:r, created:new Date().toISOString().slice(0,10)});
  localStorage.setItem('ssUsers', JSON.stringify(users));
  renderAdmin();
}

function removeUser(name){
  var users = JSON.parse(localStorage.getItem('ssUsers') || '[]').filter(function(x){return x.username!==name;});
  localStorage.setItem('ssUsers', JSON.stringify(users));
  renderAdmin();
}

window.addEventListener('DOMContentLoaded', function(){
  var saved = localStorage.getItem('ssUser');
  if(saved){
    try { loginSuccess(JSON.parse(saved)); }
    catch(e) { localStorage.removeItem('ssUser'); }
  }
  document.getElementById('loginPass').addEventListener('keydown', function(e){
    if(e.key==='Enter') doLogin();
  });
});
</script>
